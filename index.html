<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>claude-foreman — remote</title>
<style>
  :root { color-scheme: dark; --bg:#0e1116; --card:#161b22; --line:#2b313a; --fg:#e6edf3;
          --mut:#9aa4b2; --ok:#2ea043; --warn:#d29922; --bad:#da3633; --accent:#388bfd; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.45 -apple-system,Segoe UI,Roboto,sans-serif;
         padding:max(12px,env(safe-area-inset-top)) 12px 28px; }
  h1 { font-size:17px; margin:4px 0 12px; letter-spacing:.2px; }
  h1 .dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--mut); margin-right:7px; vertical-align:middle; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin:0 0 12px; }
  .row { display:flex; justify-content:space-between; gap:10px; padding:4px 0; }
  .row .k { color:var(--mut); } .row .v { font-weight:600; text-align:right; word-break:break-word; }
  .state { font-size:22px; font-weight:700; }
  .muted { color:var(--mut); font-size:13px; }
  label { display:block; color:var(--mut); font-size:12px; margin:8px 0 3px; }
  input, select { width:100%; background:#0b0f14; border:1px solid var(--line); color:var(--fg);
          border-radius:8px; padding:9px 10px; font:14px monospace; }
  .btns { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:6px; }
  button { border:0; border-radius:10px; padding:13px 10px; font-size:15px; font-weight:600; color:#fff; }
  button:active { transform:translateY(1px); }
  .b-pause{ background:var(--warn); } .b-resume{ background:var(--ok); } .b-stop{ background:var(--bad); }
  .b-ghost{ background:#21262d; color:var(--fg); border:1px solid var(--line); }
  .full { width:100%; margin-top:8px; }
  #log { font:12px monospace; color:var(--mut); white-space:pre-wrap; max-height:160px; overflow:auto; }
  .err { color:var(--bad); }
  details summary { color:var(--mut); cursor:pointer; font-size:13px; }
  .tabs { display:flex; gap:6px; margin:0 0 12px; }
  .tab { flex:1; background:#0b0f14; border:1px solid var(--line); color:var(--mut);
         border-radius:10px; padding:11px 8px; font-size:14px; font-weight:600; }
  .tab.active { color:var(--fg); background:var(--card); border-color:var(--accent); }
  .tabpane[hidden] { display:none; }
  .qcounts { margin:0 0 10px; }
  .qitem { padding:9px 0; border-top:1px solid var(--line); }
  .qitem:first-child { border-top:0; }
  .qhead { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .qst { font:11px/1 monospace; font-weight:700; padding:3px 6px; border-radius:6px; background:#0b0f14; }
  .qtitle { color:var(--mut); font-size:13px; margin-top:4px; word-break:break-word; }
  .s-done{ color:var(--ok); } .s-pending{ color:var(--mut); }
  .s-blocked,.s-escalated{ color:var(--bad); } .s-partial{ color:var(--warn); } .s-wontfix{ color:var(--mut); } .s-parked{ color:var(--warn); }
  .s-running{ color:var(--ok); } .q-run{ border-left:3px solid var(--ok); padding-left:8px; }
  .q-dim{ opacity:.45; }   /* wontfix: a closed decision — recedes */
  .overdue { background:var(--bad); color:#fff; padding:9px 11px; border-radius:8px;
             margin:0 0 12px; font-weight:600; font-size:13px; line-height:1.35; }
  .qbtn { margin-left:auto; border:1px solid var(--line); background:#21262d; color:var(--fg);
          border-radius:7px; padding:5px 10px; font-size:12px; font-weight:600; }
  .qbtn.react { border-color:var(--ok); color:var(--ok); }
</style>
</head>
<body>
  <h1><span class="dot" id="dot"></span>claude-foreman</h1>

  <div class="card" style="padding:10px 14px">
    <label style="margin:0 0 4px 0">instance</label>
    <select id="instance" onchange="onInstanceChange()"><option>—</option></select>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-status" onclick="showTab('status')">Status</button>
    <button class="tab" id="tab-queue" onclick="showTab('queue')">To-do</button>
  </div>

  <div class="tabpane" id="pane-status">
    <div class="card" id="statusCard">
      <div class="overdue" id="overdue" hidden></div>
      <div class="state" id="state">—</div>
      <div class="muted" id="ago">not connected</div>
      <hr style="border:0;border-top:1px solid var(--line);margin:10px 0">
      <div class="row"><span class="k">batch</span><span class="v" id="batch">—</span></div>
      <div class="row"><span class="k">runtime</span><span class="v" id="kills">—</span></div>
      <div class="row"><span class="k">item</span><span class="v" id="item">—</span></div>
      <div class="row"><span class="k">pending</span><span class="v" id="pending">—</span></div>
      <div class="row"><span class="k">command</span><span class="v" id="command">—</span></div>
      <div class="row"><span class="k">ack</span><span class="v" id="ack">—</span></div>
    </div>

    <div class="card">
      <div class="btns">
        <button class="b-pause"  onclick="setControl('pause')">Pause</button>
        <button class="b-resume" onclick="setControl('resume')">Resume</button>
        <button class="b-stop"   onclick="setControl('stop')">Stop</button>
      </div>
      <button class="b-ghost full" onclick="refresh()">Refresh now</button>
    </div>
  </div>

  <div class="tabpane" id="pane-queue" hidden>
    <div class="card">
      <div class="qcounts muted" id="qcounts">—</div>
      <div id="qlist"></div>
    </div>
  </div>

  <details class="card">
    <summary>Connection (stored only on this device)</summary>
    <label>Sync URL</label>
    <input id="syncUrl" placeholder="libsql://foreman-....turso.io" autocapitalize="off" autocomplete="off" spellcheck="false">
    <label>Auth token</label>
    <input id="token" type="password" placeholder="eyJ..." autocapitalize="off" autocomplete="off" spellcheck="false">
    <div class="btns" style="grid-template-columns:1fr 1fr">
      <button class="b-ghost" onclick="saveCreds()">Save</button>
      <button class="b-ghost" onclick="clearCreds()">Clear</button>
    </div>
    <p class="muted">Token is kept in this browser's localStorage only — never sent anywhere except Turso. Rotate it if this device is lost.</p>
  </details>

  <div class="card"><div id="log"></div></div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const LS_URL = "foreman_sync_url", LS_TOK = "foreman_token", LS_INST = "foreman_instance";
let timer = null;
const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function showTab(name){
  for (const t of ["status","queue"]){
    $("pane-"+t).hidden = (t!==name);
    $("tab-"+t).classList.toggle("active", t===name);
  }
}

function log(msg, isErr) {
  const t = new Date().toLocaleTimeString();
  $("log").textContent = `[${t}] ${msg}\n` + $("log").textContent;
  if (isErr) $("log").classList.add("err");
}
function normalise(u){ return u.startsWith("libsql://") ? "https://"+u.slice(9) : u; }
function creds(){ return { url: localStorage.getItem(LS_URL)||"", tok: localStorage.getItem(LS_TOK)||"" }; }

async function pipeline(sql, args){
  const c = creds();
  if (!c.url || !c.tok) throw new Error("set Sync URL + token below");
  const stmt = { sql }; if (args) stmt.args = args;
  // 8s timeout: without it a hung request never rejects and stacks up behind the 10s poll,
  // so on resume from a backgrounded/asleep tab they all reject at once ("Failed to fetch" x N).
  const ctl = new AbortController();
  const to = setTimeout(()=>ctl.abort(), 8000);
  let res;
  try {
    res = await fetch(normalise(c.url).replace(/\/+$/,"") + "/v2/pipeline", {
      method:"POST",
      headers:{ "Authorization":"Bearer "+c.tok, "Content-Type":"application/json" },
      body: JSON.stringify({ requests:[ { type:"execute", stmt } ] }),
      signal: ctl.signal
    });
  } finally { clearTimeout(to); }
  if (!res.ok) throw new Error("HTTP "+res.status+" "+(await res.text()).slice(0,160));
  const j = await res.json();
  for (const r of (j.results||[])) if (r.type==="error") throw new Error("SQL: "+((r.error||{}).message||"?"));
  const result = j.results[0].response.result;
  const cols = result.cols.map(c=>c.name);
  return result.rows.map(row => Object.fromEntries(row.map((cell,i)=>[cols[i], cell.type==="null"?null:cell.value])));
}

function arg(v){ return { type:"text", value:String(v) }; }

const COLORS = { running:"var(--ok)","idle":"var(--accent)", done:"var(--accent)",
  "paused-remote":"var(--warn)","paused-review":"var(--warn)", "stopped-remote":"var(--bad)",
  error:"var(--bad)" };

let lastStatus = [], lastControl = [], lastQueue = [];   // cached rows, so an instance switch re-renders without a round-trip
let _refreshFails = 0;   // consecutive refresh failures — log only the first of a streak (don't spam transient blips)
function selInst(){ return localStorage.getItem(LS_INST) || ""; }

function populateInstances(){
  const ids = lastStatus.map(r => r.id);
  let cur = selInst();
  if (!ids.includes(cur)) { cur = ids[0] || ""; if (cur) localStorage.setItem(LS_INST, cur); }
  $("instance").innerHTML = ids.length
    ? ids.map(id => `<option${id===cur?" selected":""}>${id}</option>`).join("")
    : "<option>(no foreman reporting)</option>";
}

function renderSelected(){
  const id = selInst();
  const s = lastStatus.find(r => r.id === id);
  const c = lastControl.find(r => r.id === id) || {};
  const now = Date.now();
  $("overdue").hidden = true;
  if (s){
    $("state").textContent = s.state || "—";
    $("dot").style.background = $("state").style.color = COLORS[s.state] || "var(--mut)";
    $("batch").textContent = s.batch ?? "—";
    $("item").textContent = s.last_item || "—";
    $("pending").textContent = s.pending ?? "—";
    // whole-run total (since foreman start) + data freshness
    const runT = parseTs(s.run_started_at);
    const runStr = isNaN(runT) ? "" : "run " + durStr((now-runT)/1000) + " · ";
    $("ago").textContent = runStr + (s.updated_at ? "updated " + agoStr(s.updated_at) : "—");
    // per-batch runtime + watchdog countdown — meaningful only while running
    const to = Number(s.timeout_sec)||0, upd = parseTs(s.updated_at);
    if (s.state === "running" && to > 0 && !isNaN(upd)){
      const el = Math.max(0,(now-upd)/1000), rem = to - el;
      if (rem >= 0){
        $("kills").textContent = durStr(el) + " / " + durStr(to) + " · kills in " + durStr(rem);
      } else {
        $("kills").textContent = durStr(el) + " / " + durStr(to) + " · OVERDUE by " + durStr(-rem);
        $("overdue").hidden = false;
        $("overdue").textContent = "⚠ No update " + durStr(-rem) + " past this batch's timeout. "
          + "The foreman may be stuck, or the relay/PC is offline — stop it from the PC (GUI), not just here.";
      }
    } else { $("kills").textContent = "—"; }
  } else {
    $("state").textContent = lastStatus.length ? "select an instance" : "no status yet";
    $("dot").style.background = "var(--mut)"; $("state").style.color = "";
    $("batch").textContent = $("item").textContent = $("pending").textContent = $("kills").textContent = "—";
    $("ago").textContent = lastStatus.length ? "—" : "foreman has not reported";
  }
  $("command").textContent = c.command || "none";
  $("ack").textContent = c.ack_at || "—";
}

function onInstanceChange(){ localStorage.setItem(LS_INST, $("instance").value); renderSelected(); renderQueue(); }

function renderQueue(){
  const row = lastQueue.find(r => r.id === selInst());
  if (!row){
    $("qcounts").textContent = lastQueue.length ? "—" : "(no to-do reported yet)";
    $("qlist").innerHTML = ""; return;
  }
  let counts = {}, items = [];
  try { counts = JSON.parse(row.counts_json || "{}"); } catch(e){}
  try { items  = JSON.parse(row.items_json  || "[]"); } catch(e){}
  const s = lastStatus.find(r => r.id === selInst());
  const runId = (s && s.state === "running") ? (s.last_item || "") : "";   // item being worked now
  $("qcounts").textContent = Object.entries(counts).map(([k,v]) => k+": "+v).join("   ") || "(empty)";
  $("qlist").innerHTML = items.map(i => {
    let btn = "";
    if (i.status === "pending")      btn = `<button class="qbtn" onclick="itemCmd('${esc(i.id)}','skip')">Skip</button>`;
    else if (i.status === "parked")  btn = `<button class="qbtn react" onclick="itemCmd('${esc(i.id)}','reactivate')">Reactivate</button>`;
    const working = i.id && i.id === runId;   // status stays 'pending'; shown as ▶ working
    const rowcls = working ? " q-run" : (i.status === "wontfix" ? " q-dim" : "");
    return `<div class="qitem${rowcls}"><div class="qhead">`+
      `<span class="qst ${working?'s-running':'s-'+esc(i.status)}">${working?'▶ working':esc(i.status)}</span>`+
      `<b>${esc(i.id)}</b><span class="muted">${esc(i.ledger||"")}</span>${btn}</div>`+
      `<div class="qtitle" title="${esc(i.title||"")}">${esc(i.title||"")}</div></div>`;
  }).join("") || '<div class="muted">no items</div>';
}

async function refresh(){
  try{
    lastStatus  = await pipeline("SELECT * FROM foreman_status ORDER BY id");
    lastControl = await pipeline("SELECT * FROM foreman_control ORDER BY id");
    try { lastQueue = await pipeline("SELECT * FROM foreman_queue ORDER BY id"); }
    catch(e){ lastQueue = []; }   // older DB without the queue table — status still works
    populateInstances();
    renderSelected();
    renderQueue();
    if (_refreshFails){ log("connection recovered"); _refreshFails = 0; }
  } catch(e){
    // Log only the FIRST failure of a streak (a backgrounded tab resuming before the network is
    // back, a Turso edge blip): the 10s poll IS the retry, so don't spam a line every cycle.
    if (_refreshFails === 0) log("refresh failed: "+e.message+" (retrying every 10s)", true);
    _refreshFails++;
    $("ago").textContent = "connection error (retrying)";
  }
}

function agoStr(iso){
  const t = Date.parse(iso.replace(" ","T").replace("Z","Z")); if (isNaN(t)) return iso;
  const s = Math.max(0, Math.round((Date.now()-t)/1000));
  if (s<90) return s+"s ago"; if (s<5400) return Math.round(s/60)+"m ago"; return Math.round(s/3600)+"h ago";
}
function parseTs(iso){ return iso ? Date.parse(String(iso).replace(" ","T")) : NaN; }
function durStr(sec){
  sec = Math.max(0, Math.round(sec));
  if (sec < 90) return sec+"s";
  if (sec < 5400) return Math.round(sec/60)+"m";
  const h = Math.floor(sec/3600), m = Math.round((sec%3600)/60);
  return h+"h"+(m?" "+m+"m":"");
}
async function itemCmd(item, action){
  const id = selInst();
  if (!id){ log("pick an instance first", true); return; }
  try{
    await pipeline(
      "INSERT INTO foreman_item_ctl(id,item,action,requested_at) VALUES(?,?,?,?) "+
      "ON CONFLICT(id,item) DO UPDATE SET action=excluded.action, requested_at=excluded.requested_at",
      [arg(id), arg(item), arg(action), arg(new Date().toISOString())]);
    log("["+id+"] "+action+" -> "+item);
    refresh();
  } catch(e){ log(action+" "+item+" failed: "+e.message, true); }
}

async function setControl(cmd){
  const id = selInst();
  if (!id){ log("pick an instance first", true); return; }
  if (cmd==="stop" && !confirm("Stop the foreman ('"+id+"') after the current batch?")) return;
  try{
    await pipeline(
      "INSERT INTO foreman_control(id,command,requested_at,requested_by,ack_at) "+
      "VALUES(?,?,?,'phone',NULL) ON CONFLICT(id) DO UPDATE SET "+
      "command=excluded.command, requested_at=excluded.requested_at, requested_by='phone', ack_at=NULL",
      [arg(id), arg(cmd), arg(new Date().toISOString())]);
    log("["+id+"] control -> "+cmd);
    refresh();
  } catch(e){ log("set "+cmd+" failed: "+e.message, true); }
}

function saveCreds(){
  localStorage.setItem(LS_URL, $("syncUrl").value.trim());
  localStorage.setItem(LS_TOK, $("token").value.trim());
  log("connection saved"); refresh();
}
function clearCreds(){ localStorage.removeItem(LS_URL); localStorage.removeItem(LS_TOK);
  $("syncUrl").value=""; $("token").value=""; log("connection cleared"); }

function startPolling(){ if (!timer) timer = setInterval(refresh, 10000); }   // auto-refresh every 10s
function stopPolling(){ if (timer){ clearInterval(timer); timer = null; } }
// A phone suspends a backgrounded/screen-off tab; its setInterval callbacks queue and then fire in a
// burst on resume, before the network is back -> a cluster of "refresh failed". Instead: stop polling
// while hidden, and on resume do ONE refresh then restart the interval.
document.addEventListener("visibilitychange", ()=>{
  if (document.hidden) stopPolling();
  else { refresh(); startPolling(); }
});
(function init(){
  const c = creds(); $("syncUrl").value = c.url; if (c.tok) $("token").value = c.tok;
  refresh();
  startPolling();
})();
</script>
</body>
</html>
